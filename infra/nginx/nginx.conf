# ==============================================================================
# CLOUDMON MVP GATEWAY CONFIGURATION (NGINX)
# ==============================================================================
#
# WARNING / IMPORTANT:
# This configuration terminates SSL/TLS using a self-signed certificate for
# local development and MVP testing purposes.
#
# Before onboarding real clients or exposing this system to the public internet:
# 1. Obtain a valid certificate from Let's Encrypt or another CA.
# 2. Update the ssl_certificate and ssl_certificate_key directives to point to
#    your production certificates.
# 3. Secure Nginx configurations (e.g., adjust client body limits, rate limits, headers).
# ==============================================================================

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Redirect all HTTP traffic to HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # HTTPS Gateway Server
    server {
        listen 443 ssl;
        server_name localhost;

        # TLS Configuration - MVP Self-Signed Certificates
        # (Must be replaced with trusted certificates in production)
        ssl_certificate     /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Static Frontend Assets
        location / {
            proxy_pass http://frontend:5173; # Vite local dev server
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Public Backend APIs
        location /api/ {
            proxy_pass http://backend:5000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Security Constraint: Explicitly BLOCK external access to internal paths
        location /internal/ {
            deny all;
            return 403;
        }
    }
}
